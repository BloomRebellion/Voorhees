<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Log // Gallery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Special+Elite&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,500;1,500&display=swap');

  :root{
    --void: #0A0C0F;
    --panel: #14181D;
    --panel-edge: #262E36;
    --paper: #E9E5DA;
    --ash: #8B95A0;
    --green: #5FE38A;
    --violet: #A98CE0;
    --blood: #D4534F;
    --amber: #E3A855;
    --cyan: #55C8D9;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--void);
    background-image:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.35) 0, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.25) 0, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.2) 0, transparent 100%),
      radial-gradient(1px 1px at 30% 85%, rgba(255,255,255,0.3) 0, transparent 100%),
      radial-gradient(circle at 50% 0%, rgba(169,140,224,0.10) 0, transparent 45%),
      radial-gradient(circle at 90% 90%, rgba(95,227,138,0.06) 0, transparent 40%);
    font-family: 'IBM Plex Mono', monospace;
    color: var(--paper);
    min-height: 100vh;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,255,255,0.018) 0px,
      rgba(255,255,255,0.018) 1px,
      transparent 1px,
      transparent 3px
    );
    z-index: 100;
  }

  header {
    text-align: center;
    padding: 60px 20px 20px;
  }

  header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--green);
  }

  header h1 {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 42px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    margin: 10px 0 8px;
    color: var(--paper);
    text-shadow: 0 0 18px rgba(95,227,138,0.35), 0 0 40px rgba(169,140,224,0.15);
  }

  header p.sub {
    font-size: 12.5px;
    color: var(--ash);
    margin: 0;
  }

  .gallery {
    max-width: 1000px;
    margin: 0 auto;
    padding: 30px 20px 100px;
  }

  .year-section {
    margin-bottom: 40px;
  }

  .year-heading {
    font-family: 'Oswald', sans-serif;
    font-weight: 700;
    font-size: 28px;
    letter-spacing: 0.04em;
    color: var(--paper);
    margin: 0 0 4px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .year-heading .year-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ash);
    font-weight: 400;
  }
  .year-rule {
    height: 1px;
    background: linear-gradient(to right, var(--year-accent, var(--green)), transparent);
    margin-bottom: 16px;
  }

  .year-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 14px;
  }

  .loading-note {
    text-align: center;
    color: var(--ash);
    font-size: 12px;
    padding: 40px 0;
  }

  .frame {
    position: relative;
    aspect-ratio: 1;
    overflow: hidden;
    cursor: pointer;
    background: var(--panel);
    box-shadow: inset 0 0 0 1px var(--panel-edge);
    clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
  }

  .frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: saturate(0.9) contrast(1.05);
    transition: transform 0.3s ease, filter 0.3s ease;
    display: block;
  }

  .frame:hover img {
    transform: scale(1.06);
    filter: saturate(1) contrast(1.1);
  }

  .frame .frame-caption {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    padding: 8px 10px 6px;
    background: linear-gradient(to top, rgba(10,12,15,0.9), transparent);
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--paper);
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .frame:hover .frame-caption { opacity: 1; }

  .empty-slot {
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px dashed var(--panel-edge);
    color: var(--ash);
    font-size: 10.5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-align: center;
    padding: 10px;
  }

  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(5,6,8,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 30px;
    backdrop-filter: blur(3px);
  }
  .lightbox.open { display: flex; }
  .lightbox img {
    max-width: 100%;
    max-height: 80vh;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .lightbox .lb-wrap {
    max-width: 900px;
    width: 100%;
  }
  .lightbox .lb-caption {
    text-align: center;
    margin-top: 14px;
    color: var(--ash);
    font-family: 'Special Elite', monospace;
    font-size: 13px;
  }
  .lightbox .close {
    position: fixed;
    top: 20px; right: 24px;
    background: none;
    border: none;
    color: var(--paper);
    font-size: 28px;
    cursor: pointer;
    font-family: 'IBM Plex Mono', monospace;
  }

  footer {
    text-align: center;
    padding: 0 20px 60px;
  }
  footer .close-line {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--violet);
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  .compass {
    position: fixed;
    bottom: 18px; left: 18px;
    width: 42px; height: 42px;
    opacity: 0.55;
    pointer-events: none;
    animation: spin 14s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .compass { animation: none; } }

  .channel-switch {
    position: fixed;
    bottom: 18px; right: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px 10px 12px;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 3px;
    text-decoration: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    z-index: 50;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .channel-switch:hover {
    border-color: var(--amber);
    box-shadow: 0 8px 24px rgba(0,0,0,0.5), 0 0 16px rgba(227,168,85,0.35);
  }
  .channel-switch .signal-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 8px 2px rgba(227,168,85,0.7);
    animation: blip 1.8s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blip {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }
  @media (prefers-reduced-motion: reduce) { .channel-switch .signal-dot { animation: none; } }
  .channel-switch .ch-text { font-family: 'IBM Plex Mono', monospace; line-height: 1.3; }
  .channel-switch .ch-label {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ash);
  }
  .channel-switch .ch-name {
    font-size: 11.5px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--amber);
  }
  @media (max-width: 480px) {
    .channel-switch .ch-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">// visual log</div>
  <h1>Photo Log</h1>
  <p class="sub">sorted automatically, by year</p>
</header>

<div class="gallery" id="gallery">
  <div class="loading-note" id="loadingNote">reading photo dates…</div>
</div>

<footer>
  <p class="close-line">Not every moment made it into the timeline. Some just got a picture.</p>
</footer>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">&times;</button>
  <div class="lb-wrap">
    <img id="lbImg" src="" alt="">
    <div class="lb-caption" id="lbCaption"></div>
  </div>
</div>

<svg class="compass" viewBox="0 0 100 100">
  <circle cx="50" cy="50" r="46" fill="none" stroke="#5FE38A" stroke-width="1.5" opacity="0.6"/>
  <circle cx="50" cy="50" r="30" fill="none" stroke="#5FE38A" stroke-width="1" opacity="0.4"/>
  <circle cx="50" cy="50" r="14" fill="none" stroke="#5FE38A" stroke-width="1" opacity="0.4"/>
  <line x1="50" y1="4" x2="50" y2="96" stroke="#5FE38A" stroke-width="0.75" opacity="0.3"/>
  <line x1="4" y1="50" x2="96" y2="50" stroke="#5FE38A" stroke-width="0.75" opacity="0.3"/>
  <path d="M 50 50 L 50 4 A 46 46 0 0 1 92 30 Z" fill="#5FE38A" opacity="0.18"/>
  <circle cx="50" cy="50" r="3" fill="#5FE38A"/>
</svg>

<a href="anniversary.html" class="channel-switch">
  <div class="signal-dot"></div>
  <div class="ch-text">
    <div class="ch-label">signal found —</div>
    <div class="ch-name">tune to field log</div>
  </div>
</a>

<a href="playlists.html" class="channel-switch" style="right: 18px; bottom: 78px;" onmouseover="this.style.borderColor='#55C8D9'" onmouseout="this.style.borderColor=''">
  <div class="signal-dot" style="background: #55C8D9; box-shadow: 0 0 8px 2px rgba(85,200,217,0.7);"></div>
  <div class="ch-text">
    <div class="ch-label">signal found —</div>
    <div class="ch-name" style="color: #55C8D9;">tune to audio log</div>
  </div>
</a>

<script>
// Add photos here. Just drop the image file into the images/ folder and add
// a line below with its filename. The year is read automatically from the
// photo's EXIF date (the same metadata Google Photos uses). If a photo has
// no EXIF date (screenshots, downloaded images, etc.), give it a manual
// "year" so it still gets sorted somewhere sensible.
const PHOTOS = [
  { src: 'images/he-asked.jpg', caption: 'July 23, 2017', year: 2017 },
  // { src: 'images/your-next-photo.jpg', caption: 'optional caption' },
];

const YEAR_ACCENTS = ['#A98CE0', '#D4534F', '#E3A855', '#5FE38A', '#55C8D9'];

function readExifDate(buffer) {
  try {
    const view = new DataView(buffer);
    if (view.getUint16(0, false) !== 0xFFD8) return null;
    let offset = 2;
    const length = view.byteLength;
    while (offset < length - 4) {
      const marker = view.getUint16(offset, false);
      if (marker !== 0xFFE1) {
        if ((marker & 0xFF00) !== 0xFF00) break;
        const size = view.getUint16(offset + 2, false);
        offset += 2 + size;
        continue;
      }
      const app1Offset = offset + 4;
      if (view.getUint32(app1Offset, false) !== 0x45786966) return null;
      const tiffOffset = app1Offset + 6;
      const little = view.getUint16(tiffOffset, false) === 0x4949;
      const firstIFDOffset = view.getUint32(tiffOffset + 4, little);
      const ifdOffset = tiffOffset + firstIFDOffset;

      function readIFD(off) {
        const numEntries = view.getUint16(off, little);
        const entries = {};
        for (let i = 0; i < numEntries; i++) {
          const entryOffset = off + 2 + i * 12;
          entries[view.getUint16(entryOffset, little)] = entryOffset;
        }
        return entries;
      }

      function getAsciiString(entryOffset) {
        const count = view.getUint32(entryOffset + 4, little);
        const valueOffset = count <= 4 ? entryOffset + 8 : tiffOffset + view.getUint32(entryOffset + 8, little);
        let str = '';
        for (let i = 0; i < count - 1; i++) str += String.fromCharCode(view.getUint8(valueOffset + i));
        return str;
      }

      const ifd0 = readIFD(ifdOffset);
      let exifIFD = null;
      if (ifd0[0x8769]) {
        const valueOffset = view.getUint32(ifd0[0x8769] + 8, little);
        exifIFD = readIFD(tiffOffset + valueOffset);
      }

      let dateStr = null;
      if (exifIFD && exifIFD[0x9003]) dateStr = getAsciiString(exifIFD[0x9003]);
      else if (ifd0[0x0132]) dateStr = getAsciiString(ifd0[0x0132]);

      if (!dateStr) return null;
      const m = dateStr.match(/^(\d{4}):(\d{2}):(\d{2})/);
      if (!m) return null;
      return { year: parseInt(m[1]), month: parseInt(m[2]), day: parseInt(m[3]) };
    }
    return null;
  } catch (e) {
    return null;
  }
}

async function getPhotoDate(photo) {
  try {
    const res = await fetch(photo.src);
    const buffer = await res.arrayBuffer();
    const exif = readExifDate(buffer);
    if (exif) return exif;
  } catch (e) { /* fall through */ }
  if (photo.year) return { year: photo.year, month: 0, day: 0 };
  return { year: null, month: 0, day: 0 };
}

async function renderGallery() {
  const gallery = document.getElementById('gallery');
  const dated = await Promise.all(PHOTOS.map(async (p) => {
    const date = await getPhotoDate(p);
    return { ...p, ...date };
  }));

  const groups = {};
  dated.forEach(p => {
    const key = p.year || 'Undated';
    if (!groups[key]) groups[key] = [];
    groups[key].push(p);
  });

  const years = Object.keys(groups).filter(y => y !== 'Undated').map(Number).sort((a, b) => a - b);
  if (groups['Undated']) years.push('Undated');

  gallery.innerHTML = '';
  years.forEach((year, i) => {
    const photos = groups[year].sort((a, b) => (a.month - b.month) || (a.day - b.day));
    const accent = YEAR_ACCENTS[i % YEAR_ACCENTS.length];

    const section = document.createElement('div');
    section.className = 'year-section';
    section.innerHTML = `
      <div class="year-heading" style="color: ${accent}">${year} <span class="year-count">${photos.length} photo${photos.length !== 1 ? 's' : ''}</span></div>
      <div class="year-rule" style="--year-accent: ${accent}"></div>
      <div class="year-grid"></div>
    `;
    const grid = section.querySelector('.year-grid');

    photos.forEach(p => {
      const frame = document.createElement('div');
      frame.className = 'frame';
      frame.innerHTML = `
        <img src="${p.src}" alt="${p.caption || ''}" loading="lazy">
        ${p.caption ? `<div class="frame-caption">${p.caption}</div>` : ''}
      `;
      frame.addEventListener('click', () => {
        lbImg.src = p.src;
        lbCaption.textContent = p.caption || '';
        lightbox.classList.add('open');
      });
      grid.appendChild(frame);
    });

    gallery.appendChild(section);
  });

  if (years.length === 0) {
    gallery.innerHTML = '<div class="loading-note">no photos yet — add some to the images/ folder</div>';
  }
}

const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCaption = document.getElementById('lbCaption');
document.getElementById('lbClose').addEventListener('click', () => lightbox.classList.remove('open'));
lightbox.addEventListener('click', (e) => { if (e.target === lightbox) lightbox.classList.remove('open'); });

renderGallery();
</script>

</body>
</html>
